<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股損益計算機</title>

<style>
body {
    font-family: Arial, sans-serif;
    font-size: 24px;
    margin: 30px;
}

h2 {
    font-size: 24px;
}

h3 {
    font-size: 32px;
}

input, select, button {
    font-size: 24px;
    padding: 8px;
    margin: 5px;
}

#result {
    font-size: 28px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>台股損益計算機</h2>

<label>類型：</label>
<select id="type">
    <option value="stock">股票</option>
    <option value="daytrade">當沖</option>
    <option value="etf">ETF</option>
</select>

<br><br>

買入價格：
<input type="number" id="buy" step="0.01">

<br><br>

賣出價格：
<input type="number" id="sell" step="0.01">

<br><br>

<label>數量：</label>
<input type="number" id="amount" min="1" value="1">

<select id="unit">
    <option value="share">股</option>
    <option value="lot">張</option>
</select>

<br><br>

<button onclick="calc()">計算</button>

<hr>

<h3>結果</h3>

<div id="result"></div>

<script>
function calc() {

    const type = document.getElementById("type").value;
    const buy = parseFloat(document.getElementById("buy").value);
    const sell = parseFloat(document.getElementById("sell").value);
    const amount = parseInt(document.getElementById("amount").value);
    const unit = document.getElementById("unit").value;

    if (isNaN(buy) || isNaN(sell) || isNaN(amount) || amount <= 0) {
        alert("請輸入正確資料");
        return;
    }

    const qty = (unit === "lot") ? amount * 1000 : amount;

    const buyCost = buy * qty;
    const sellValue = sell * qty;

    // 手續費：0.1425%，無條件捨去，最低 1 元
    const buyFee = Math.max(Math.floor(buyCost * 0.001425), 1);
    const sellFee = Math.max(Math.floor(sellValue * 0.001425), 1);

    let taxRate = 0;

    if (type === "stock")
        taxRate = 0.003;
    else if (type === "daytrade")
        taxRate = 0.0015;
    else if (type === "etf")
        taxRate = 0.001;

    // 證交稅無條件捨去
    const tax = Math.floor(sellValue * taxRate);

    const totalBuyCost = buyCost + buyFee;
    const netSellValue = sellValue - sellFee - tax;

    const profit = netSellValue - totalBuyCost;

    const roi = (profit / totalBuyCost) * 100;

    document.getElementById("result").innerHTML = `
        股數：${qty.toLocaleString()} 股<br><br>

        買入成交金額：${Math.floor(buyCost).toLocaleString()} 元<br>
        買入手續費：${buyFee.toLocaleString()} 元<br>
        總買入成本：${Math.floor(totalBuyCost).toLocaleString()} 元<br><br>

        賣出成交金額：${Math.floor(sellValue).toLocaleString()} 元<br>
        賣出手續費：${sellFee.toLocaleString()} 元<br>
        證交稅：${tax.toLocaleString()} 元<br>
        賣出淨收入：${Math.floor(netSellValue).toLocaleString()} 元<br><br>

        <h3>已實現損益：${Math.floor(profit).toLocaleString()} 元</h3>
        <h3>投報率：${roi.toFixed(2)}%</h3>
    `;
}
</script>

</body>
</html>
